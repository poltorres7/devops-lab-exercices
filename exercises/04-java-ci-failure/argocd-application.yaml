apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exercise-04-java-ci-failure
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: exercise-04
  source:
    repoURL: git@github.com:poltorres7/devops-lab-exercices.git
    targetRevision: HEAD
    path: exercises/04-java-ci-failure/helm
    helm:
      releaseName: exercise-04
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

